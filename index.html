<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanaDiary</title>

  <!-- Included 20 unique Japanese fonts ranging from basic to textbook, marker, cute, and pixel styles -->
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic&family=BIZ+UDMincho&family=Dela+Gothic+One&family=DotGothic16&family=Figtree:wght@400;500;600;700&family=Hachi+Maru+Pop&family=JetBrains+Mono:wght@400;600&family=Kaisei+Decol&family=Klee+One&family=M+PLUS+Rounded+1c&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Potta+One&family=Rampart+One&family=Reggae+One&family=RocknRoll+One&family=Shippori+Mincho:wght@500;600&family=Stick&family=Train+One&family=Yusei+Magic&family=Zen+Kaku+Gothic+New:wght@400;500&family=Zen+Old+Mincho:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ========================================================
       BASE STYLES & LAYOUT
    ======================================================== */
    html {
      zoom: 1.1;
    }

    :root {
      /* Fallback variables */
      --bg: #0f1419;
      --card: rgba(26, 31, 40, 0.7);
      --card-hover: rgba(35, 42, 53, 0.9);
      --text: #ffffff;
      --muted: #8b949e;
      --border: rgba(255, 255, 255, 0.1);
      
      /* Vibrant 6-Color System */
      --c1: #6496ff;
      --c2: #7aa3ff;
      --c3: #ff7eb6;
      --c4: #52e5e5;
      --c5: #fdfd96;
      --c6: #a78bfa;

      --shadow-color: rgba(0, 0, 0, 0.2);
      --bg-grad-alpha: 12%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Figtree', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      /* Dynamic multi-color background gradient generated purely from the theme's colors! */
      background-image: 
        radial-gradient(circle at 10% 20%, color-mix(in srgb, var(--c1) var(--bg-grad-alpha), transparent), transparent 50%), 
        radial-gradient(circle at 90% 80%, color-mix(in srgb, var(--c3) var(--bg-grad-alpha), transparent), transparent 50%);
      background-attachment: fixed;
      color: var(--text);
      transition: background-color 0.5s ease, color 0.5s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 900px; 
      margin: 0 auto;
      padding: 60px 24px;
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ========================================================
       HEADER
    ======================================================== */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-weight: 500;
      font-size: 3.2rem;
      letter-spacing: -0.05em;
      color: var(--text);
      text-shadow: 0 4px 24px color-mix(in srgb, var(--c1) 30%, transparent);
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ========================================================
       CONTROLS & DROPDOWNS
    ======================================================== */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      background: transparent;
      width: 100%;
    }

    .controls-left, .controls-right {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    button, .select-trigger {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 12px 24px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      box-shadow: 0 8px 32px var(--shadow-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover, .select-trigger:hover, .select-trigger:focus-visible {
      border-color: color-mix(in srgb, var(--c1) 60%, transparent);
      color: var(--text);
      transform: translateY(-2px);
      background: var(--card-hover);
      box-shadow: 0 8px 20px color-mix(in srgb, var(--c1) 20%, transparent);
    }

    button.active {
      background: var(--c1);
      border-color: var(--c1);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      box-shadow: 0 6px 20px color-mix(in srgb, var(--c1) 40%, transparent);
    }

    /* Segmented Control Grouping */
    .segmented-control {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      background: color-mix(in srgb, var(--card) 40%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 6px;
      gap: 4px;
      box-shadow: 0 8px 32px var(--shadow-color);
    }

    .segmented-control button {
      border: none;
      background: transparent;
      box-shadow: none;
      border-radius: 12px;
      padding: 10px 18px;
      margin: 0;
    }

    .segmented-control button:hover, .segmented-control button:focus-visible {
      background: color-mix(in srgb, var(--text) 8%, transparent);
      transform: none; /* Prevent jumping inside the pill */
      box-shadow: none;
    }

    .segmented-control button.active {
      background: var(--c1);
      color: #fff;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--c1) 40%, transparent);
      transform: none;
    }

    .select-trigger.open {
      border-color: var(--c1);
      color: var(--c1);
      background: var(--card-hover);
    }

    .select-trigger svg.chevron {
      transition: transform 0.3s ease;
      opacity: 0.7;
    }

    .select-trigger.open svg.chevron {
      transform: rotate(180deg);
    }

    .theme-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-select {
      position: relative;
    }

    .select-options {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      min-width: 220px;
      max-height: 50vh;
      overflow-y: auto;
      box-shadow: 0 16px 40px var(--shadow-color);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px) scale(0.98);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      transform-origin: top right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .custom-select.open .select-options {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .select-options::-webkit-scrollbar { width: 6px; }
    .select-options::-webkit-scrollbar-track { background: transparent; margin: 8px 0; }
    .select-options::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .select-options::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    .option {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      outline: none;
    }

    .option .opt-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option:hover, .option:focus-visible {
      background: color-mix(in srgb, var(--text) 5%, transparent);
      color: var(--text);
    }

    .option.selected {
      background: color-mix(in srgb, var(--c1) 15%, transparent);
      color: var(--c1);
      font-weight: 700;
    }

    .option.selected::after {
      content: '✔';
      font-size: 1rem;
      color: var(--c2);
      font-family: system-ui, sans-serif;
    }

    /* ========================================================
       GRID & KANA CELLS
    ======================================================== */
    .chart-wrapper {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px var(--shadow-color);
      transition: all 0.4s ease;
      position: relative;
    }

    .kana-grid {
      display: grid;
      grid-template-columns: 28px repeat(5, 1fr);
      gap: 16px;
      align-items: center;
    }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: lowercase;
      opacity: 0.6;
      user-select: none;
    }

    .col-header { color: var(--c3); }
    .row-header { color: var(--c4); }

    .kana-cell {
      position: relative;
      aspect-ratio: 1 / 1.1;
      padding: 16px 8px;
      text-align: center;
      border-radius: 16px;
      background: color-mix(in srgb, var(--bg) 40%, transparent);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow: hidden;
    }

    .kana-cell.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .kana-cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, color-mix(in srgb, var(--c1) 20%, transparent), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .kana-cell:hover {
      transform: translateY(-4px) scale(1.05);
      border-color: color-mix(in srgb, var(--c1) 70%, transparent);
      box-shadow: 0 12px 24px color-mix(in srgb, var(--c1) 25%, transparent);
      background: var(--card-hover);
      z-index: 2;
    }

    .kana-cell:hover::before {
      opacity: 1;
    }

    .kana-cell:active {
      transform: translateY(0) scale(0.98);
    }

    .kana-char {
      position: relative;
      font-size: 2.2rem;
      line-height: 1;
      color: var(--text);
      font-weight: 500;
      transition: color 0.3s ease;
      z-index: 1;
    }

    .kana-romaji {
      position: relative;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.05em;
      z-index: 1;
      text-transform: lowercase;
    }

    .kana-cell:hover .kana-char {
      color: var(--c1);
      text-shadow: 0 0 12px color-mix(in srgb, var(--c1) 40%, transparent);
    }

    .kana-cell:hover .kana-romaji {
      color: var(--c2);
    }

    /* ========================================================
       PRONUNCIATION TOOLTIP & INFO BUTTON
    ======================================================== */
    .info-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: color-mix(in srgb, var(--card) 60%, transparent);
      border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      z-index: 10;
      outline: none;
    }

    .kana-cell:hover .info-btn, .info-btn:focus-visible {
      opacity: 0.7;
    }

    .info-btn:hover, .info-btn:focus-visible {
      background: var(--c3);
      color: #fff;
      border-color: var(--c3);
      transform: scale(1.1);
      opacity: 1;
    }

    .pronunciation-tip {
      position: fixed;
      background: var(--card-hover);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--c1);
      color: var(--text);
      padding: 16px 20px;
      border-radius: 16px;
      font-family: 'Figtree', sans-serif;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 9999;
      box-shadow: 0 10px 40px var(--shadow-color), 0 0 20px color-mix(in srgb, var(--c1) 25%, transparent);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 240px;
      max-width: 340px;
    }

    .pronunciation-tip.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .tip-header {
      display: flex;
      align-items: center;
    }

    .pronunciation-tip .romaji-hl {
      color: var(--c5);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      background: color-mix(in srgb, var(--c5) 15%, transparent);
      padding: 4px 12px;
      border-radius: 8px;
      text-transform: lowercase;
    }

    .tip-desc {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
      font-weight: 500;
    }

    .tip-examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
      padding-top: 14px;
      border-top: 1px dashed color-mix(in srgb, var(--border) 100%, transparent);
    }

    .example-item {
      display: grid;
      grid-template-columns: minmax(60px, auto) minmax(60px, auto) 1fr;
      align-items: center;
      gap: 16px;
      background: color-mix(in srgb, var(--bg) 60%, transparent);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .example-item:hover, .example-item:focus-visible {
      background: color-mix(in srgb, var(--card-hover) 80%, transparent);
      border-color: color-mix(in srgb, var(--c1) 50%, transparent);
      transform: translateX(4px);
      outline: none;
    }

    .example-jp {
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      font-size: 1.05rem;
    }

    .example-ro {
      color: var(--c2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .example-en {
      color: var(--c4);
      font-size: 0.85rem;
      font-style: italic;
      text-align: right;
      line-height: 1.2;
    }

    /* ========================================================
       RESPONSIVENESS & MOBILE LAYOUT
    ======================================================== */
    @media (max-width: 600px) {
      .container { padding: 30px 16px; }
      .header h1 { font-size: 2.5rem; }
      .chart-wrapper { padding: 20px; border-radius: 20px; }
      .kana-grid { grid-template-columns: 16px repeat(5, 1fr); gap: 8px; }
      .grid-header { font-size: 0.85rem; }
      .kana-cell { padding: 12px 4px; border-radius: 12px; }
      .kana-char { font-size: 1.8rem; }
      .kana-romaji { font-size: 0.75rem; }
      .info-btn { opacity: 0.5; width: 20px; height: 20px; top: 4px; right: 4px; }
      .info-btn svg { width: 10px; height: 10px; }
      .controls { gap: 16px; justify-content: center; }
      button, .select-trigger { padding: 10px 16px; font-size: 0.9rem; }
      
      /* Mobile Tooltip Docking */
      .pronunciation-tip {
        left: 50% !important;
        top: auto !important;
        bottom: 20px !important;
        transform: translate(-50%, 20px) scale(0.95) !important;
        width: calc(100% - 32px);
        max-width: 100%;
      }

      .pronunciation-tip.visible {
        transform: translate(-50%, 0) scale(1) !important;
      }

      /* Dropdown Overflow Fix for Mobile (Centered Modal Style) */
      .select-options {
        position: fixed;
        top: 50% !important;
        left: 50% !important;
        right: auto !important;
        bottom: auto !important;
        width: 85vw !important;
        max-width: 320px;
        max-height: 60vh !important;
        transform: translate(-50%, -40%) scale(0.95) !important;
        border-radius: 20px !important;
        z-index: 10000 !important;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 
                    0 0 0 2000px rgba(0, 0, 0, 0.4) !important;
      }

      .custom-select.open .select-options {
        transform: translate(-50%, -50%) scale(1) !important;
      }
    }

    /* ========================================================
       THEMES (40 Total: 22 Dark, 18 Light) 
       Multi-Color Palette System applied to all themes
    ======================================================== */
    /* --- DARK THEMES --- */
    .theme-night {
      --bg: #0d1117; --card: rgba(22, 27, 34, 0.7); --card-hover: rgba(33, 38, 45, 0.9);
      --text: #e6edf3; --muted: #7d8590; --border: rgba(255, 255, 255, 0.1);
      --c1: #58a6ff; --c2: #3fb950; --c3: #d2a8ff; --c4: #ff7b72; --c5: #f2cc60; --c6: #38bdf8;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }
    .theme-catppuccin {
      --bg: #1e1e2e; --card: rgba(49, 50, 68, 0.6); --card-hover: rgba(69, 71, 90, 0.8);
      --text: #cdd6f4; --muted: #a6adc8; --border: rgba(180, 190, 254, 0.15);
      --c1: #cba6f7; --c2: #89b4fa; --c3: #a6e3a1; --c4: #f38ba8; --c5: #fab387; --c6: #f5c2e7;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }
    .theme-gruvbox {
      --bg: #282828; --card: rgba(60, 56, 54, 0.7); --card-hover: rgba(80, 73, 69, 0.9);
      --text: #ebdbb2; --muted: #a89984; --border: rgba(235, 219, 178, 0.1);
      --c1: #fabd2f; --c2: #fe8019; --c3: #b8bb26; --c4: #fb4934; --c5: #d3869b; --c6: #8ec07c;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 10%;
    }
    .theme-tokyo {
      --bg: #1a1b26; --card: rgba(36, 40, 59, 0.7); --card-hover: rgba(41, 46, 66, 0.9);
      --text: #c0caf5; --muted: #565f89; --border: rgba(122, 162, 247, 0.15);
      --c1: #7aa2f7; --c2: #bb9af7; --c3: #9ece6a; --c4: #f7768e; --c5: #e0af68; --c6: #7dcfff;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }
    .theme-nord {
      --bg: #2e3440; --card: rgba(59, 66, 82, 0.7); --card-hover: rgba(67, 76, 94, 0.9);
      --text: #eceff4; --muted: #d8dee9; --border: rgba(216, 222, 233, 0.1);
      --c1: #88c0d0; --c2: #81a1c1; --c3: #a3be8c; --c4: #bf616a; --c5: #ebcb8b; --c6: #b48ead;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 10%;
    }
    .theme-dracula {
      --bg: #282a36; --card: rgba(68, 71, 90, 0.5); --card-hover: rgba(68, 71, 90, 0.8);
      --text: #f8f8f2; --muted: #6272a4; --border: rgba(189, 147, 249, 0.2);
      --c1: #bd93f9; --c2: #ff79c6; --c3: #50fa7b; --c4: #ff5555; --c5: #f1fa8c; --c6: #8be9fd;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }
    .theme-rosepine {
      --bg: #191724; --card: rgba(31, 29, 46, 0.7); --card-hover: rgba(38, 35, 58, 0.9);
      --text: #e0def4; --muted: #908caa; --border: rgba(224, 222, 244, 0.1);
      --c1: #c4a7e7; --c2: #eb6f92; --c3: #f6c177; --c4: #9ccfd8; --c5: #31748f; --c6: #ea9a97;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }
    .theme-cyberpunk {
      --bg: #0d0221; --card: rgba(26, 9, 51, 0.6); --card-hover: rgba(38, 15, 77, 0.8);
      --text: #e0d3ff; --muted: #715c99; --border: rgba(0, 229, 255, 0.2);
      --c1: #00e5ff; --c2: #ff00ff; --c3: #fcee09; --c4: #00ff00; --c5: #ff003c; --c6: #715c99;
      --shadow-color: rgba(0,0,0,0.4); --bg-grad-alpha: 15%;
    }
    .theme-obsidian {
      --bg: #0f0f0f; --card: rgba(28, 28, 28, 0.8); --card-hover: rgba(40, 40, 40, 1);
      --text: #e8eaed; --muted: #9aa0a6; --border: rgba(255, 255, 255, 0.05);
      --c1: #8ab4f8; --c2: #c586c0; --c3: #4ec9b0; --c4: #ce9178; --c5: #d16969; --c6: #b5cea8;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 10%;
    }
    .theme-coral-dark {
      --bg: #1b1a1f; --card: rgba(38, 36, 44, 0.7); --card-hover: rgba(49, 46, 56, 0.9);
      --text: #f1e9e0; --muted: #b8a9a0; --border: rgba(255, 127, 80, 0.15);
      --c1: #ff7f50; --c2: #ff9b73; --c3: #ffd700; --c4: #48d1cc; --c5: #ff69b4; --c6: #98fb98;
      --shadow-color: rgba(0,0,0,0.3); --bg-grad-alpha: 12%;
    }

    currentThemeId = savedTheme.replace('theme-', '');

  function applyThemeFont() {
    document.body.className = `theme-${currentThemeId} ${currentFont}`;
    localStorage.setItem('kanaflow-theme', `theme-${currentThemeId}`);
    localStorage.setItem('kanaflow-font', currentFont);
    
    const activeThemeObj = themes.find(t => t.id === currentThemeId);
    themeLabel.textContent = activeThemeObj.name;
    themeIcon.innerHTML = activeThemeObj.type === 'light' ? iconSun : iconMoon;
    
    Array.from(themeOptions.children).forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.value === currentThemeId);
    });
    Array.from(fontOptions.children).forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.value === currentFont);
    });
  }

  // Build Theme Dropdown
  themes.forEach(t => {
    const div = document.createElement('div');
    div.className = 'option' + (t.id === currentThemeId ? ' selected' : '');
    div.dataset.value = t.id;
    div.tabIndex = 0;
    div.innerHTML = `<div class="opt-left"><span class="theme-icon">${t.type === 'light' ? iconSun : iconMoon}</span><span>${t.name}</span></div>`;
    
    div.onclick = () => {
      currentThemeId = t.id;
      applyThemeFont();
      closeAllDropdowns();
    };
    div.onkeydown = (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        div.click();
      }
    };
    themeOptions.appendChild(div);
  });

  function showPronunciationTip(e, romaji) {
    e.preventDefault();
    
    // Toggle off if clicking the same character while visible
    if (tooltip.classList.contains('visible') && tooltip.dataset.currentRomaji === romaji) {
      tooltip.classList.remove('visible');
      tooltip.dataset.currentRomaji = '';
      return;
    }
    
    tooltip.dataset.currentRomaji = romaji;
    const info = KANA_INFO[romaji];
    
    if (!info) {
      tooltip.innerHTML = `
        <div class="tip-header">
          <span class="romaji-hl">${romaji}</span>
        </div>
        <div class="tip-desc">Pronunciation tip not available.</div>
      `;
    } else {
      let examplesHtml = '';
      let exList = isHiragana ? info.h_ex : info.k_ex;
      
      if (!exList || exList.length === 0) {
          exList = isHiragana ? info.k_ex : info.h_ex;
      }

      if (exList && exList.length > 0) {
        examplesHtml = '<div class="tip-examples">' + 
          exList.map(ex => {
            return `
              <div class="example-item" tabindex="0" onclick="speak('${ex.j}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); speak('${ex.j}');}">
                <span class="example-jp">${ex.j}</span>
                <span class="example-ro">${ex.r}</span>
                <span class="example-en">${ex.m}</span>
              </div>`;
          }).join('') +
          '</div>';
      }

      tooltip.innerHTML = `
        <div class="tip-header">
          <span class="romaji-hl">${romaji}</span>
        </div>
        <div class="tip-desc">${info.d}</div>
        ${examplesHtml}
      `;
    }
    
    // Display offscreen to measure
    tooltip.style.left = '-9999px';
    tooltip.style.top = '-9999px';
    tooltip.classList.add('visible');

    requestAnimationFrame(() => {
      if (window.innerWidth > 600) {
        const rect = tooltip.getBoundingClientRect();
        const vw = document.documentElement.clientWidth;
        const vh = document.documentElement.clientHeight;
        const offset = 15;
        
        let x = e.clientX + offset;
        let y = e.clientY + offset;
        
        if (x + rect.width > vw - offset) {
          x = e.clientX - rect.width - offset;
        }
        
        if (y + rect.height > vh - offset) {
          y = e.clientY - rect.height - offset;
        }

        x = Math.max(offset, Math.min(x, vw - rect.width - offset));
        y = Math.max(offset, Math.min(y, vh - rect.height - offset));
        
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      }
    });
  }

  // Hide tooltip when clicking anywhere else
  document.addEventListener('click', (e) => {
    if (!tooltip.contains(e.target)) {
      tooltip.classList.remove('visible');
      tooltip.dataset.currentRomaji = '';
    }
  });

  function renderGrid() {
    grid.innerHTML = '';
    
    const topHeaders = ['', 'a', 'i', 'u', 'e', 'o'];
    topHeaders.forEach(text => {
      const h = document.createElement('div');
      h.className = 'grid-header col-header';
      h.textContent = text;
      grid.appendChild(h);
    });

    const rowHeadersBasic = ['', 'k', 's', 't', 'n', 'h', 'm', 'y', 'r', 'w', ''];
    const rowHeadersDaku = ['g', 'z', 'd', 'b', 'p'];
    const rowHeadersYoon = ['ky', 'sh', 'ch', 'ny', 'hy', 'my', 'ry', 'gy', 'j', 'by', 'py'];
    const rowHeadersExt = ['v', 'f', 'misc', 't/d', 'xtra'];
    
    let rowHeaders = rowHeadersBasic;
    if (currentMode === 'dakuten') rowHeaders = rowHeadersDaku;
    if (currentMode === 'yoon') rowHeaders = rowHeadersYoon;
    if (currentMode === 'extended') rowHeaders = rowHeadersExt;

    for (let i = 0; i < currentMap.length; i += 5) {
      const rHead = document.createElement('div');
      rHead.className = 'grid-header row-header';
      rHead.textContent = rowHeaders[Math.floor(i / 5)] || '';
      grid.appendChild(rHead);

      for (let j = 0; j < 5; j++) {
        const item = currentMap[i + j];
        const d = document.createElement('div');
        
        if(!item) {
          d.className = 'kana-cell empty';
        } else {
          d.className = 'kana-cell';
          d.tabIndex = 0;
          
          d.innerHTML = `
            <div class="info-btn" aria-label="Pronunciation Info" tabindex="0" title="Pronunciation Info">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
            </div>
            <div class="kana-char">${item.k}</div>
            <div class="kana-romaji">${item.r}</div>
          `;

          d.onclick = (e) => speak(item.k);
          d.onkeydown = (e) => {
            if(e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              speak(item.k);
            }
          };

          const infoBtn = d.querySelector('.info-btn');
          infoBtn.onclick = (e) => {
            e.stopPropagation();
            showPronunciationTip(e, item.r);
          };
          infoBtn.onkeydown = (e) => {
            if(e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              e.stopPropagation();
              showPronunciationTip(e, item.r);
            }
          };
        }
        grid.appendChild(d);
      }
    }
  }

  function setMode() {
    computeMap();
    renderGrid();
  }

  // Button Handlers
  basicBtn.onclick = () => { currentMode = 'basic'; updateModeButtons(); setMode(); };
  dakutenBtn.onclick = () => { currentMode = 'dakuten'; updateModeButtons(); setMode(); };
  yoonBtn.onclick = () => { currentMode = 'yoon'; updateModeButtons(); setMode(); };
  extendedBtn.onclick = () => { currentMode = 'extended'; updateModeButtons(); setMode(); };
  
  katakanaToggle.onclick = () => { 
    isHiragana = !isHiragana; 
    katakanaToggle.textContent = isHiragana ? 'Hiragana' : 'Katakana'; 
    setMode(); 
  };

  // ===== Audio (Text-to-Speech) =====
  const synth = 'speechSynthesis' in window ? window.speechSynthesis : null;
  let jpVoices = [];

  function loadVoices() {
    if (!synth) return;
    const voices = synth.getVoices();
    jpVoices = voices.filter(v => v.lang === 'ja-JP' || v.lang === 'ja_JP' || v.lang.includes('ja'));
  }

  if (synth && synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }
  
  loadVoices();

  function speak(t){ 
    if(!synth) return; 
    synth.cancel(); 
    
    // Japanese comma added to enforce proper intonation and prevent clipping
    const u = new SpeechSynthesisUtterance(t + "、"); 
    u.lang = 'ja-JP'; 
    u.rate = 0.85; 
    u.pitch = 1.0;
    u.volume = 1.0; 

    if (jpVoices.length > 0) {
      const preferredVoice = jpVoices.find(v => 
        v.name.includes('Google') || 
        v.name.includes('Premium') || 
        v.name.includes('Kyoko') || 
        v.name.includes('Otoya')
      ) || jpVoices[0];
      u.voice = preferredVoice;
    }

    synth.speak(u); 
  }

  // ===== Initialize Application =====
  computeMap();
  renderGrid();
  applyThemeFont();
</script>
</body>
</html>
